version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DEBUG=1
    command: python manage.py runserver 0.0.0.0:8000
    networks:
      - app-network
    depends_on:
      minio-setup:
        condition: service_completed_successfully

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: student
      MINIO_ROOT_PASSWORD: student
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      app-network:
        aliases:
          - minio.local

  minio-setup:
    image: minio/mc:latest
    depends_on:
      - minio
    networks:
      - app-network
    entrypoint: >
      /bin/sh -c " sleep 5; mc alias set myminio http://minio.local:9000 student student; mc mb myminio/users-bucket || true; mc anonymous set public myminio/users-bucket || true; exit 0; "

networks:
  app-network:
    driver: bridge

volumes:
  minio_data:
