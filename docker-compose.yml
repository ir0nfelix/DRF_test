version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./media:/app/media
    environment:
      - DEBUG=1
    command: sh -c "python manage.py migrate && python manage.py clear_db && python manage.py seed_db && python manage.py runserver 0.0.0.0:8000"
